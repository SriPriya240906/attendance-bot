name: Daily Attendance Bot

on:
  repository_dispatch:
    types: [run-attendance]   # cron-job.org triggers this
  workflow_dispatch:           # allows manual trigger from GitHub too

jobs:
  send-attendance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IMS_USERNAME: ${{ secrets.IMS_USERNAME }}
          IMS_PASSWORD: ${{ secrets.IMS_PASSWORD }}
        run: python main.py --run-now
